on: [push, workflow_dispatch]
jobs:
  cypress: 
    run-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
       -run: npm ci # uruchom skrypty npm w srodowisku ciaglej integracji 
      - run: npx cypress run
      # run: npm run mytests